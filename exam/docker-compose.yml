version: '3.8'

services:
  emqx:
    image: emqx:5.7
    container_name: emqx
    ports:
      - "1883:1883"
      - "8083:8083"
      - "18083:18083"
    volumes:
      - ./emqx.conf:/opt/emqx/etc/emqx.conf
    environment:
      - EMQX_NAME=emqx
      - EMQX_HOST=127.0.0.1
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
